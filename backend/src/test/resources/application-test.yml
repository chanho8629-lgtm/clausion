spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  rabbitmq:
    host: localhost
    port: 5672

app:
  jwt:
    secret: test-jwt-secret-key-that-is-at-least-32-characters-long
    expiration: 86400000
  openai:
    api-key: test-key
    model: gpt-4o
  livekit:
    api-key: test-key
    api-secret: test-secret
    url: ws://localhost:7881
  cors:
    allowed-origins: http://localhost:3000
