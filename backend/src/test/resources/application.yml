spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: 'jdbc:h2:mem:clausion;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;INIT=CREATE DOMAIN IF NOT EXISTS JSONB AS JSON\;'
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true

app:
  jwt:
    secret: test-jwt-secret-key-that-is-at-least-32-bytes
    expiration: 3600000
  openai:
    api-key: test-key
  aws:
    s3:
      bucket: test-bucket
      region: ap-northeast-2
